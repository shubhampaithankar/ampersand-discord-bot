# Lavalink v4 — real working config (copied from the mini-pc, replaces the fresh-authored stub).
# Resolves ${LAVALINK_PASSWORD}/${SPOTIFY_CLIENT_ID}/${SPOTIFY_CLIENT_SECRET} from the container env.
server:
  port: 2333
  address: 0.0.0.0

plugins:
  youtube:
    enabled: true

  lavasrc:
    providers:
      - 'ytsearch:"%ISRC%"'
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "IN"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: true
      localFiles: false

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"

    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"

  server:
    password: "${LAVALINK_PASSWORD}"

    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

    filters:
      volume: true
      equalizer: true
      timescale: true

    bufferDurationMs: 400
    frameBufferDurationMs: 3000
    opusEncodingQuality: 10
    resamplingQuality: HIGH

    trackStuckThresholdMs: 10000
    playerUpdateInterval: 5
    useSeekGhosting: true

metrics:
  prometheus:
    enabled: false

logging:
  level:
    root: INFO
    lavalink: INFO